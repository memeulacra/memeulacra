services:
  db:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: memedb
      POSTGRES_USER: memeuser
      POSTGRES_PASSWORD: memepass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgres/meme_templates_202502271257.sql:/docker-entrypoint-initdb.d/02-data.sql
  
  meme_editor:
    build:
      context: ./meme_template_editor
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      POSTGRES_DB: memedb
      POSTGRES_USER: memeuser
      POSTGRES_PASSWORD: memepass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - ./meme_template_editor:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      POSTGRES_DB: memedb
      POSTGRES_USER: memeuser
      POSTGRES_PASSWORD: memepass
      POSTGRES_HOST: db
    env_file:
      - ./.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: postgres://memeuser:memepass@db:5432/memedb
      NEXT_PUBLIC_ONCHAINKIT_API_KEY: 6IXH4m79EVAdWozcD7k0jznfCXVyQCZl
      NODE_ENV: production
      DEBUG: "true"
      PORT: 3005
    depends_on:
      - db

volumes:
  postgres_data:
